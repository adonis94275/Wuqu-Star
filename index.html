<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASQE v8.1 | Scoring & Backtest Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #020617; color: #f8fafc; }
        .score-circle { transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-left: 1px solid rgba(51, 65, 85, 0.5); }
        #launchScreen { transition: opacity 0.6s ease, visibility 0.6s ease; }
        .fade-out { opacity: 0 !important; visibility: hidden !important; }
        #mainApp { opacity: 0; visibility: hidden; transition: opacity 0.8s ease 0.2s; }
        .fade-in { opacity: 1 !important; visibility: visible !important; }
    </style>
</head>
<body class="flex flex-col min-h-screen relative overflow-hidden">

    <div id="launchScreen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4">
        <div class="bg-slate-900 rounded-3xl p-8 w-full max-w-md flex flex-col items-center shadow-[0_0_50px_rgba(59,130,246,0.15)] border border-slate-800 relative overflow-hidden">
            <div class="absolute top-0 w-full h-1 bg-gradient-to-r from-blue-600 via-indigo-500 to-emerald-500"></div>
            <div class="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center mb-5 border border-slate-700 shadow-inner">
                <span class="text-3xl">🧮</span>
            </div>
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300 tracking-wider mb-1">ASQE v8.1</h1>
            <p class="text-[10px] text-indigo-400 mb-8 font-mono tracking-widest uppercase bg-indigo-900/30 px-2 py-1 rounded">Scoring & Backtest Engine</p>
            <input type="password" id="passwordInput" placeholder="輸入機構授權碼 (admin)" class="w-full bg-slate-950 text-white border border-slate-700 rounded-xl px-4 py-3.5 mb-5 focus:outline-none focus:border-indigo-500 text-center tracking-widest transition-all font-mono">
            <button id="openAppBtn" class="w-full bg-slate-100 hover:bg-white text-slate-900 font-black py-3.5 rounded-xl transition-all shadow-lg tracking-widest">初始化雙引擎模組</button>
        </div>
    </div>

    <div id="mainApp" class="flex flex-col min-h-screen w-full h-full absolute inset-0">
        <header class="bg-slate-900 border-b border-slate-800 p-3 lg:p-4 flex flex-col sm:flex-row items-center justify-between z-40 shrink-0 gap-3 shadow-md">
            <div class="flex items-center gap-4">
                <div class="w-9 h-9 bg-gradient-to-br from-indigo-600 to-slate-800 rounded-xl flex items-center justify-center font-bold text-lg border border-slate-700">⚡</div>
                <div class="flex flex-col">
                    <h1 class="text-lg font-black tracking-widest text-slate-100 leading-tight">ASQE v8.1</h1>
                    <span class="text-[10px] text-indigo-400 font-mono tracking-wider">STABLE EDITION</span>
                </div>
            </div>
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <input type="text" id="tickerInput" value="2330.TW" placeholder="代碼" class="bg-slate-950 text-white border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500 w-full sm:w-36 transition-colors uppercase font-mono text-sm">
                <button id="analyzeBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-lg whitespace-nowrap text-sm">執行量化與回測</button>
            </div>
        </header>

        <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/90 z-50 flex flex-col items-center justify-center hidden backdrop-blur-md">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-slate-800 border-t-indigo-500 mb-4"></div>
            <p class="text-xs font-mono text-indigo-400 tracking-widest animate-pulse">Running Robust Data Engine...</p>
        </div>

        <div class="flex-1 flex flex-col p-2">
            <div id="priceChartContainer" class="w-full h-96 rounded-xl border border-slate-800 bg-slate-900"></div>
        </div>
    </div>

    <script>
        const ALLOWED_PASS = ['852767', 'admin'];
        let priceChart, candleSeries;

        document.addEventListener('DOMContentLoaded', () => {
            const pwdInput = document.getElementById('passwordInput');
            const openBtn = document.getElementById('openAppBtn');
            function unlock() {
                if (ALLOWED_PASS.includes(pwdInput.value)) {
                    document.getElementById('launchScreen').classList.add('fade-out');
                    document.getElementById('mainApp').classList.add('fade-in');
                    initCharts();
                    runAnalysis('2330.TW');
                }
            }
            openBtn.addEventListener('click', unlock);
            document.getElementById('analyzeBtn').onclick = () => runAnalysis(document.getElementById('tickerInput').value);
        });

        function initCharts() {
            priceChart = LightweightCharts.createChart(document.getElementById('priceChartContainer'), {
                layout: { background: { color: '#020617' }, textColor: '#cbd5e1' },
                grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } }
            });
            candleSeries = priceChart.addCandlestickSeries();
        }

        // --- 強化的 Yahoo 資料抓取 ---
        async function fetchMarketData(ticker) {
            const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=1y&interval=1d`;
            // 使用多重公開 API 代理輪詢，增加穩定性
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                `https://corsproxy.io/?${encodeURIComponent(url)}`,
                `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`
            ];

            for (let proxy of proxies) {
                try {
                    const response = await fetch(proxy, { headers: { 'User-Agent': 'Mozilla/5.0' }});
                    if (!response.ok) continue;
                    
                    const data = await response.json();
                    if (data?.chart?.result?.[0]) {
                        const result = data.chart.result[0];
                        const quotes = result.indicators.quote[0];
                        return result.timestamp.map((t, i) => ({
                            time: new Date(t * 1000).toISOString().split('T')[0],
                            open: quotes.open[i],
                            high: quotes.high[i],
                            low: quotes.low[i],
                            close: quotes.close[i]
                        })).filter(d => d.open !== null);
                    }
                } catch (e) { continue; }
            }
            throw new Error("Yahoo API 備援失效");
        }

        async function runAnalysis(ticker) {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            try {
                const data = await fetchMarketData(ticker);
                candleSeries.setData(data);
                priceChart.timeScale().fitContent();
            } catch (e) {
                console.error(e);
                alert("數據擷取失敗，請檢查代碼格式(如: 2330.TW)");
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
