<!DOCTYPE html>
<html lang="zh-TW" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ASQE v13.4 | Web-Quant Ultimate</title>
    
    <script>
        window.unlockSystem = function() {
            var pass = document.getElementById('passwordInput').value.trim();
            if(pass === '852767' || pass === 'admin') {
                var ls = document.getElementById('launchScreen');
                ls.style.opacity = '0';
                setTimeout(function() {
                    ls.style.display = 'none';
                    document.getElementById('setupModal').classList.remove('fade-out');
                }, 400);
            } else {
                document.getElementById('errorMsg').style.opacity = '1';
            }
        };

        window.saveAndStart = function() {
            var fKey = document.getElementById('finmindKeyInput');
            var mKey = document.getElementById('fmpKeyInput');
            if(fKey) window.KEY_FINMIND = fKey.value.trim();
            if(mKey) window.KEY_FMP = mKey.value.trim();
            
            try {
                if (window.localStorage) {
                    localStorage.setItem('ASQE_FINMIND_KEY', window.KEY_FINMIND);
                    localStorage.setItem('ASQE_FMP_KEY', window.KEY_FMP);
                }
            } catch(e) {}
            
            var modal = document.getElementById('setupModal');
            modal.style.opacity = '0';
            setTimeout(function() {
                modal.style.display = 'none';
                var mainApp = document.getElementById('mainApp');
                mainApp.classList.remove('fade-out');
                
                // 嘗試呼叫量化引擎
                if(typeof window.runAnalysis === 'function') {
                    window.runAnalysis('2330.TW');
                } else {
                    alert("✅ 成功解鎖介面！但量化引擎似乎被您的瀏覽器阻擋，無法載入運算模組。");
                }
            }, 400);
        };

        window.switchTab = function(m, t) {
            window.currentMarket = m;
            document.getElementById('tickerInput').value = t;
            document.getElementById('tabTW').className = "px-3 py-1.5 rounded-md text-[11px] font-bold transition-all " + (m==='TW'?"bg-orange-600 text-white shadow":"text-slate-400 hover:text-white");
            document.getElementById('tabUS').className = "px-3 py-1.5 rounded-md text-[11px] font-bold transition-all " + (m==='US'?"bg-orange-600 text-white shadow":"text-slate-400 hover:text-white");
            if(typeof window.runAnalysis === 'function') window.runAnalysis(t);
        };
        
        window.triggerAnalysis = function() {
            var val = document.getElementById('tickerInput').value;
            if(typeof window.runAnalysis === 'function') window.runAnalysis(val);
        };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #020617; color: #f8fafc; font-size: 13px; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-left: 1px solid rgba(51, 65, 85, 0.5); }
        .fade-transition { transition: opacity 0.4s ease, visibility 0.4s ease; }
        .fade-out { opacity: 0 !important; visibility: hidden !important; pointer-events: none; }
        .data-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 0.75rem; padding: 0.75rem; }
        .metric-value { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-weight: 900; }
    </style>
</head>
<body class="flex flex-col min-h-screen relative overflow-hidden">

    <div id="launchScreen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4 fade-transition transition-opacity duration-300">
        <div class="bg-slate-900 rounded-3xl p-8 w-full max-w-md flex flex-col items-center shadow-[0_0_80px_rgba(234,179,8,0.15)] border border-slate-800 relative overflow-hidden">
            <div class="absolute top-0 w-full h-1 bg-gradient-to-r from-yellow-600 via-orange-500 to-red-600"></div>
            <div class="w-16 h-16 bg-slate-950 rounded-2xl flex items-center justify-center mb-5 border border-slate-700 shadow-inner">
                <span class="text-3xl">👑</span>
            </div>
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-300 tracking-wider mb-1">ASQE v13.4</h1>
            <p class="text-[9px] text-orange-400 mb-8 font-mono tracking-widest uppercase bg-orange-900/30 px-2 py-1 rounded">Web-Quant Extreme Edition</p>
            <input type="password" id="passwordInput" placeholder="輸入機構授權碼 (admin)" onkeypress="if(event.key==='Enter') window.unlockSystem()" class="w-full bg-slate-950 text-white border border-slate-700 rounded-xl px-4 py-3.5 mb-5 focus:outline-none focus:border-orange-500 text-center tracking-widest font-mono">
            <button id="unlockBtn" onclick="window.unlockSystem()" class="w-full bg-gradient-to-r from-yellow-600 to-orange-600 hover:from-yellow-500 hover:to-orange-500 text-white font-black py-3.5 rounded-xl transition-all shadow-lg tracking-widest cursor-pointer">啟動量化避險核心</button>
            <p id="errorMsg" class="text-red-400 text-[11px] mt-4 opacity-0 transition-opacity font-bold bg-red-950/50 px-3 py-1 rounded">授權碼錯誤</p>
        </div>
    </div>

    <div id="setupModal" class="fixed inset-0 z-[200] bg-slate-950/90 flex items-center justify-center fade-transition fade-out backdrop-blur-md p-4 transition-opacity duration-300">
        <div class="bg-slate-900 rounded-3xl p-6 w-full max-w-lg border border-slate-700 shadow-2xl relative">
            <h2 class="text-lg font-black text-white mb-2 flex items-center gap-2 tracking-widest"><span>⚙️</span> 機構 API 路由配置</h2>
            <div class="space-y-3 max-h-[65vh] overflow-y-auto pr-2 mt-4">
                <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800"><label class="text-[10px] text-slate-400 font-bold mb-1 uppercase block">FinMind API Key (台股主力)</label><input type="password" id="finmindKeyInput" class="w-full bg-slate-900 text-white border border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:border-orange-500 font-mono text-xs mt-1"></div>
                <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800"><label class="text-[10px] text-slate-400 font-bold mb-1 uppercase block">FMP API Key (美股專用)</label><input type="password" id="fmpKeyInput" class="w-full bg-slate-900 text-white border border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:border-orange-500 font-mono text-xs mt-1"></div>
                <button id="saveAndStartBtn" onclick="window.saveAndStart()" class="w-full bg-gradient-to-r from-yellow-600 to-orange-600 text-white font-black py-3 rounded-xl transition-all mt-2 text-sm shadow-lg tracking-widest cursor-pointer">寫入配置並啟動</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="flex flex-col min-h-screen w-full h-full absolute inset-0 fade-transition fade-out transition-opacity duration-500">
        <header class="bg-slate-900 border-b border-slate-800 p-2.5 flex flex-col sm:flex-row items-center justify-between z-40 shrink-0 shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gradient-to-br from-yellow-600 to-red-900 rounded-lg flex items-center justify-center font-bold text-sm border border-slate-700">👑</div>
                <div class="flex flex-col"><h1 class="text-base font-black tracking-widest text-slate-100 leading-none">ASQE v13.4</h1><span class="text-[9px] text-orange-400 font-mono tracking-wider mt-0.5">MODULAR ENGINE</span></div>
            </div>
            <div class="flex items-center gap-2 mt-2 sm:mt-0">
                <div class="flex bg-slate-950 rounded-lg p-1 border border-slate-800">
                    <button id="tabTW" onclick="window.switchTab('TW', '2330.TW')" class="px-3 py-1.5 rounded-md text-[11px] font-bold transition-all bg-orange-600 text-white shadow cursor-pointer">台股 TW</button>
                    <button id="tabUS" onclick="window.switchTab('US', 'SPY')" class="px-3 py-1.5 rounded-md text-[11px] font-bold transition-all text-slate-400 hover:text-white cursor-pointer">美股 US</button>
                </div>
                <input type="text" id="tickerInput" value="2330.TW" onkeypress="if(event.key==='Enter') window.triggerAnalysis()" class="bg-slate-950 text-white border border-slate-700 rounded-lg px-3 py-1.5 focus:outline-none focus:border-orange-500 w-28 uppercase font-mono text-xs">
                <button id="analyzeBtn" onclick="window.triggerAnalysis()" class="bg-orange-600 hover:bg-orange-500 text-white font-bold py-1.5 px-4 rounded-lg shadow-lg text-xs transition-colors cursor-pointer">極限運算</button>
                <button onclick="document.getElementById('setupModal').style.display='flex'; setTimeout(()=>document.getElementById('setupModal').style.opacity='1',10)" class="bg-slate-800 text-slate-300 py-1.5 px-2 rounded-lg text-xs border border-slate-700 cursor-pointer">⚙️</button>
            </div>
        </header>

        <div id="loadingOverlay" class="fixed inset-0
