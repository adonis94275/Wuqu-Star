<!DOCTYPE html>
<html lang="zh-TW" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ASQE v11.0 | Statistical Robustness Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #020617; color: #f8fafc; }
        .score-circle { transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-panel { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border-left: 1px solid rgba(51, 65, 85, 0.5); }
        .fade-transition { transition: opacity 0.5s ease, visibility 0.5s ease; }
        .fade-out { opacity: 0 !important; visibility: hidden !important; }
        .fade-in { opacity: 1 !important; visibility: visible !important; }
    </style>
</head>
<body class="flex flex-col min-h-screen relative overflow-hidden">

    <div id="launchScreen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4 fade-transition">
        <div class="bg-slate-900 rounded-3xl p-8 w-full max-w-md flex flex-col items-center shadow-[0_0_60px_rgba(99,102,241,0.2)] border border-slate-800 relative overflow-hidden">
            <div class="absolute top-0 w-full h-1 bg-gradient-to-r from-emerald-600 via-teal-500 to-indigo-600"></div>
            <div class="w-16 h-16 bg-slate-950 rounded-2xl flex items-center justify-center mb-5 border border-slate-700 shadow-inner">
                <span class="text-3xl">🛡️</span>
            </div>
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300 tracking-wider mb-1">ASQE v11.0</h1>
            <p class="text-[10px] text-emerald-400 mb-8 font-mono tracking-widest uppercase bg-emerald-900/30 px-2 py-1 rounded">Statistical Robustness Engine</p>
            <input type="password" id="passwordInput" placeholder="輸入機構授權碼 (admin)" class="w-full bg-slate-950 text-white border border-slate-700 rounded-xl px-4 py-3.5 mb-5 focus:outline-none focus:border-emerald-500 text-center tracking-widest font-mono">
            <button id="unlockBtn" class="w-full bg-gradient-to-r from-emerald-600 to-teal-700 hover:from-emerald-500 hover:to-teal-600 text-white font-black py-3.5 rounded-xl transition-all shadow-lg tracking-widest">載入統計收縮核心</button>
            <p id="errorMsg" class="text-red-400 text-xs mt-4 opacity-0 transition-opacity">授權碼錯誤</p>
        </div>
    </div>

    <div id="setupModal" class="fixed inset-0 z-[200] bg-slate-950/90 flex items-center justify-center fade-transition fade-out backdrop-blur-md p-4">
        <div class="bg-slate-900 rounded-3xl p-6 w-full max-w-lg border border-slate-700 shadow-2xl relative">
            <button id="closeSettingsBtn" class="absolute top-5 right-5 text-slate-400 hover:text-white transition-colors hidden">✕</button>
            <h2 class="text-xl font-black text-white mb-2 flex items-center gap-2 tracking-widest"><span>⚙️</span> 數據源與 DCS 權重配置</h2>
            <p class="text-[11px] text-slate-400 mb-4 leading-relaxed">v11.0 啟動 DCS (Data Confidence Score)。若 API 留空或失效，對應之基本面與籌碼分數將套用 0.6 或 0.3 信心衰減權重。</p>
            
            <div class="space-y-3 max-h-[65vh] overflow-y-auto pr-2">
                <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800">
                    <label class="flex justify-between items-center text-[11px] text-slate-400 font-bold mb-1.5 uppercase tracking-wider">
                        <span>FinMind API Key <span class="text-green-500 ml-1 font-normal">台股主力</span></span>
                    </label>
                    <input type="password" id="finmindKeyInput" class="w-full bg-slate-900 text-white border border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:border-green-500 font-mono text-xs">
                </div>
                <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800">
                    <label class="flex justify-between items-center text-[11px] text-slate-400 font-bold mb-1.5 uppercase tracking-wider">
                        <span>Fugle API Key <span class="text-teal-500 ml-1 font-normal">台股備援</span></span>
                    </label>
                    <input type="password" id="fugleKeyInput" class="w-full bg-slate-900 text-white border border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:border-teal-500 font-mono text-xs">
                </div>
                <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800">
                    <label class="flex justify-between items-center text-[11px] text-slate-400 font-bold mb-1.5 uppercase tracking-wider">
                        <span>FMP API Key <span class="text-blue-500 ml-1 font-normal">美股專用</span></span>
                    </label>
                    <input type="password" id="fmpKeyInput" class="w-full bg-slate-900 text-white border border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:border-blue-500 font-mono text-xs">
                </div>
                <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800">
                    <label class="flex justify-between items-center text-[11px] text-slate-400 font-bold mb-1.5 uppercase tracking-wider">
                        <span>Finnhub API Key <span class="text-purple-500 ml-1 font-normal">即時/備援</span></span>
                    </label>
                    <input type="password" id="finnhubKeyInput" class="w-full bg-slate-900 text-white border border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:border-purple-500 font-mono text-xs">
                </div>
                <button id="saveAndStartBtn" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-black py-3 rounded-xl transition-all mt-2 text-sm shadow-lg tracking-widest">寫入配置並啟動</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="flex flex-col min-h-screen w-full h-full absolute inset-0 fade-transition fade-out">
        <header class="bg-slate-900 border-b border-slate-800 p-3 lg:p-4 flex flex-col sm:flex-row items-center justify-between z-40 shrink-0 gap-3 shadow-md">
            <div class="flex items-center gap-4">
                <div class="w-9 h-9 bg-gradient-to-br from-emerald-600 to-slate-800 rounded-xl flex items-center justify-center font-bold text-lg border border-slate-700">🛡️</div>
                <div class="flex flex-col">
                    <h1 class="text-lg font-black tracking-widest text-slate-100 leading-tight">ASQE v11.0</h1>
                    <span class="text-[10px] text-emerald-400 font-mono tracking-wider">STATISTICAL ROBUSTNESS</span>
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
                <div id="regimeBadge" class="hidden text-xs font-bold px-3 py-1.5 rounded-lg border shadow-inner flex items-center gap-1.5 font-mono">
                    <span id="regimeIcon"></span><span id="regimeText">偵測中...</span>
                </div>
                
                <div class="flex bg-slate-950 rounded-lg p-1 border border-slate-800">
                    <button id="tabTW" class="px-4 py-1.5 rounded-md text-xs font-bold transition-all bg-emerald-600 text-white shadow">台股 TW</button>
                    <button id="tabUS" class="px-4 py-1.5 rounded-md text-xs font-bold transition-all text-slate-400 hover:text-white">美股 US</button>
                </div>
                
                <div class="flex items-center gap-2 w-full sm:w-auto">
                    <input type="text" id="tickerInput" value="2330.TW" placeholder="代碼" class="bg-slate-950 text-white border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-emerald-500 w-full sm:w-36 transition-colors uppercase font-mono text-sm">
                    <button id="analyzeBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-lg whitespace-nowrap text-sm disabled:opacity-50">載入戰術分析</button>
                    <button id="settingsBtn" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2 px-3 rounded-lg transition-colors border border-slate-700 shadow" title="設定">⚙️</button>
                </div>
            </div>
        </header>

        <div id="systemWarning" class="hidden shrink-0 mx-2 mt-2 bg-yellow-900/40 border border-yellow-500/50 p-2.5 rounded-lg flex items-center justify-between z-10 shadow-lg">
            <div class="flex items-center gap-3"><span class="text-lg">⚠️</span><span id="systemWarningText" class="text-xs text-yellow-200 font-bold tracking-wide">系統提示</span></div>
            <button onclick="document.getElementById('systemWarning').classList.add('hidden')" class="text-yellow-400 hover:text-white text-sm px-2">✕</button>
        </div>

        <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/90 z-50 flex flex-col items-center justify-center hidden backdrop-blur-md">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-slate-800 border-t-emerald-500 mb-4"></div>
            <p id="loadingText" class="text-xs font-mono text-emerald-400 tracking-widest animate-pulse">Bayesian Shrinkage & GARCH Block MC Simulating...</p>
        </div>

        <div class="flex-1 flex flex-col lg:flex-row relative overflow-hidden bg-slate-950 p-2 gap-2">
            <div class="flex-1 flex flex-col gap-2 min-w-0">
                <div class="relative w-full rounded-xl border border-slate-800 bg-slate-900 shadow-inner flex flex-col flex-1 min-h-[300px] overflow-hidden">
                    <div class="absolute top-2 left-4 z-10 pointer-events-none w-full pr-4">
                        <div class="flex items-center gap-3">
                            <span id="chartTitle" class="text-2xl font-black text-slate-100 tracking-tight drop-shadow-md">---</span>
                            <span id="rtPrice" class="
