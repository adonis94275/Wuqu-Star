<!DOCTYPE html>
<html lang="zh-TW" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ASQE v13.8 | True Flow Ultimate Edition</title>
    
    <script>
        var unlockSystem = function() {
            var pass = document.getElementById('passwordInput').value.trim();
            if(pass === '852767' || pass === 'admin') {
                var ls = document.getElementById('launchScreen');
                ls.style.opacity = '0';
                setTimeout(function() {
                    ls.style.display = 'none';
                    document.getElementById('setupModal').classList.remove('fade-out');
                }, 400);
            } else {
                document.getElementById('errorMsg').style.opacity = '1';
            }
        };

        var saveAndStart = function() {
            var fKey = document.getElementById('finmindKeyInput');
            var mKey = document.getElementById('fmpKeyInput');
            
            window.KEY_FINMIND = fKey ? fKey.value.trim() : '';
            window.KEY_FMP = mKey ? mKey.value.trim() : '';
            
            try {
                if (window.localStorage) {
                    localStorage.setItem('ASQE_FINMIND_KEY', window.KEY_FINMIND);
                    localStorage.setItem('ASQE_FMP_KEY', window.KEY_FMP);
                }
            } catch(e) {}
            
            var modal = document.getElementById('setupModal');
            modal.style.opacity = '0';
            setTimeout(function() {
                modal.style.display = 'none';
                var mainApp = document.getElementById('mainApp');
                mainApp.classList.remove('fade-out');
                if(typeof window.runAnalysis === 'function') window.runAnalysis('2330.TW');
            }, 400);
        };

        var switchTab = function(m, t) {
            window.currentMarket = m;
            document.getElementById('tickerInput').value = t;
            document.getElementById('tabTW').className = "px-3 py-1.5 rounded-md text-[11px] font-bold transition-all " + (m==='TW'?"bg-orange-600 text-white shadow":"text-slate-400 hover:text-white");
            document.getElementById('tabUS').className = "px-3 py-1.5 rounded-md text-[11px] font-bold transition-all " + (m==='US'?"bg-orange-600 text-white shadow":"text-slate-400 hover:text-white");
            if(typeof window.runAnalysis === 'function') window.runAnalysis(t);
        };
        
        var triggerAnalysis = function() {
            var val = document.getElementById('tickerInput').value;
            if(typeof window.runAnalysis === 'function') window.runAnalysis(val);
        };

        window.onerror = function(msg, url, lineNo) {
            console.error("Global Error: " + msg + " at " + lineNo);
            return false;
        };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #020617; color: #f8fafc; font-size: 13px; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-left: 1px solid rgba(51, 65, 85, 0.5); }
        .fade-transition { transition: opacity 0.4s ease, visibility 0.4s ease; }
        .fade-out { opacity: 0 !important; visibility: hidden !important; pointer-events: none; }
        .data-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 0.75rem; padding: 0.75rem; }
        .metric-value { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-weight: 900; }
    </style>
</head>
<body class="flex flex-col min-h-screen relative overflow-hidden">

    <div id="launchScreen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4 fade-transition transition-opacity duration-300">
        <div class="bg-slate-900 rounded-3xl p-8 w-full max-w-md flex flex-col items-center shadow-[0_0_80px_rgba(234,179,8,0.15)] border border-slate-800 relative overflow-hidden">
            <div class="absolute top-0 w-full h-1 bg-gradient-to-r from-yellow-600 via-orange-500 to-red-600"></div>
            <div class="w-16 h-16 bg-slate-950 rounded-2xl flex items-center justify-center mb-5 border border-slate-700 shadow-inner">
                <span class="text-3xl">👑</span>
            </div>
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-300 tracking-wider mb-1">ASQE v13.8</h1>
            <p class="text-[9px] text-orange-400 mb-8 font-mono tracking-widest uppercase bg-orange-900/30 px-2 py-1 rounded">True Flow Active Edition</p>
            <input type="password" id="passwordInput" placeholder="輸入機構授權碼 (admin)" onkeypress="if(event.key==='Enter') unlockSystem()" class="w-full bg-slate-950 text-white border border-slate-700 rounded-xl px-4 py-3.5 mb-5 focus:outline-none focus:border-orange-500 text-center tracking-widest font-mono">
            <button id="unlockBtn" onclick="unlockSystem()" class="w-full bg-gradient-to-r from-yellow-600 to-orange-600 hover:from-yellow-500 hover:to-orange-500 text-white font-black py-3.5 rounded-xl transition-all shadow-lg tracking-widest cursor-pointer">啟動量化避險核心</button>
            <p id="errorMsg" class="text-red-400 text-[11px] mt-4 opacity-0 transition-opacity font-bold bg-red-950/50 px-3 py-1 rounded">授權碼錯誤</p>
        </div>
    </div>

    <div id="setupModal" class="fixed inset-0 z-[200] bg-slate-950/90 flex items-center justify-center fade-transition fade-out backdrop-blur-md p-4 transition-opacity duration-300">
        <div class="bg-slate-900 rounded-3xl p-6 w-full max-w-lg border border-slate-700 shadow-2xl relative">
            <h2 class="text-lg font-black text-white mb-2 flex items-center gap-2 tracking-widest"><span>⚙️</span> 機構 API 路由配置</h2>
            <p class="text-[10px] text-slate-400 mb-4">v13.8 已實裝真實籌碼模組，您的 FinMind 金鑰將被用於計算三大法人買賣加速度。</p>
            <div class="space-y-3 max-h-[65vh] overflow-y-auto pr-2 mt-2">
                <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800"><label class="text-[9px] text-slate-400 font-bold mb-1 uppercase block">FinMind API Key (啟用三大法人模組)</label><input type="password" id="finmindKeyInput" class="w-full bg-slate-900 text-white border border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:border-orange-500 font-mono text-xs mt-1"></div>
                <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800"><label class="text-[9px] text-slate-400 font-bold mb-1 uppercase block">FMP API Key (美股主力 - 可留空)</label><input type="password" id="fmpKeyInput" class="w-full bg-slate-900 text-white border border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:border-orange-500 font-mono text-xs mt-1"></div>
                <button id="saveAndStartBtn" onclick="saveAndStart()" class="w-full bg-gradient-to-r from-yellow-600 to-orange-600 text-white font-black py-3 rounded-xl transition-all mt-3 text-sm shadow-lg tracking-widest cursor-pointer">寫入配置並啟動</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="flex flex-col min-h-screen w-full h-full absolute inset-0 fade-transition fade-out transition-opacity duration-500">
        <header class="bg-slate-900 border-b border-slate-800 p-2.5 flex flex-col sm:flex-row items-center justify-between z-40 shrink-0 shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gradient-to-br from-yellow-600 to-red-900 rounded-lg flex items-center justify-center font-bold text-sm border border-slate-700">👑</div>
                <div class="flex flex-col"><h1 class="text-base font-black tracking-widest text-slate-100 leading-none">ASQE v13.8</h1><span class="text-[9px] text-orange-400 font-mono tracking-wider mt-0.5">TRUE FLOW ENABLED</span></div>
            </div>
            <div class="flex items-center gap-2 mt-2 sm:mt-0">
                <div id="apiStatusBadge" class="hidden sm:flex text-[9px] px-2 py-1 rounded font-mono bg-slate-950 border border-slate-700 text-slate-400 items-center gap-1"><span id="apiStatusDot" class="w-1.5 h-1.5 rounded-full bg-green-500"></span><span id="apiStatusText">Ready</span></div>
                <div class="flex bg-slate-950 rounded-lg p-1 border border-slate-800">
                    <button id="tabTW" onclick="switchTab('TW', '2330.TW')" class="px-3 py-1.5 rounded-md text-[11px] font-bold transition-all bg-orange-600 text-white shadow cursor-pointer">台股 TW</button>
                    <button id="tabUS" onclick="switchTab('US', 'SPY')" class="px-3 py-1.5 rounded-md text-[11px] font-bold transition-all text-slate-400 hover:text-white cursor-pointer">美股 US</button>
                </div>
                <input type="text" id="tickerInput" value="2330.TW" onkeypress="if(event.key==='Enter') triggerAnalysis()" class="bg-slate-950 text-white border border-slate-700 rounded-lg px-3 py-1.5 focus:outline-none focus:border-orange-500 w-28 uppercase font-mono text-xs">
                <button id="analyzeBtn" onclick="triggerAnalysis()" class="bg-orange-600 hover:bg-orange-500 text-white font-bold py-1.5 px-4 rounded-lg shadow-lg text-xs transition-colors cursor-pointer">極限運算</button>
                <button onclick="document.getElementById('setupModal').style.display='flex'; setTimeout(function(){document.getElementById('setupModal').style.opacity='1'},10)" class="bg-slate-800 text-slate-300 py-1.5 px-2 rounded-lg text-xs border border-slate-700 cursor-pointer">⚙️</button>
            </div>
        </header>

        <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/90 z-50 flex flex-col items-center justify-center hidden backdrop-blur-md">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-slate-800 border-t-orange-500 mb-4"></div>
            <p class="text-[10px] font-mono text-orange-400 tracking-widest animate-pulse" id="loadingText">Fetching Market & Flow Data...</p>
        </div>

        <div class="flex-1 flex flex-col lg:flex-row relative overflow-hidden bg-slate-950 p-1.5 gap-1.5">
            <div class="flex-1 flex flex-col gap-1.5 min-w-0">
                <div class="relative w-full rounded-xl border border-slate-800 bg-slate-900 shadow-inner flex flex-col flex-1 min-h-[300px] overflow-hidden">
                    <div class="absolute top-2 left-3 z-10 pointer-events-none w-full">
                        <div class="flex items-baseline gap-3"><span id="chartTitle" class="text-xl font-black text-slate-100 drop-shadow">---</span></div>
                        <div class="flex flex-col gap-0.5 mt-1 text-[10px] font-mono text-slate-400">
                            <div class="flex gap-3"><span class="text-fuchsia-400" id="leg-ema20">E20: --</span><span class="text-cyan-400" id="leg-ema60">E60: --</span><span class="text-yellow-500" id="leg-poc">POC: --</span></div>
                            <div id="leg-vol">Vol: --</div>
                        </div>
                    </div>
                    <div id="priceChartContainer" class="w-full flex-1 mt-2"></div>
                </div>
                <div class="relative w-full rounded-xl border border-slate-800 bg-slate-900 shadow-inner h-[140px] shrink-0 overflow-hidden">
                    <div class="absolute top-1 left-3 z-10 text-[9px] font-mono flex gap-3 text-slate-400">
                        <span class="text-purple-400" id="leg-adx">ADX: --</span><span class="text-blue-400" id="leg-rsi">RSI: --</span><span class="text-slate-500" id="leg-atr">ATR: --</span>
                    </div>
                    <div id="dmiChartContainer" class="w-full h-full mt-4"></div>
                </div>
            </div>

            <div class="w-full lg:w-[480px] glass-panel flex flex-col shrink-0 overflow-y-auto h-[calc(100vh-56px)] custom-scrollbar rounded-xl border border-slate-800">
                <div class="p-3 flex flex-col gap-3">
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-700 relative overflow-hidden flex items-
